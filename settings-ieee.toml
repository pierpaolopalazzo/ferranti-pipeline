[figures.006]
# Extension 1.F — latency breakdown.
# Two-panel double-column figure: step response (left) and stage breakdown (right).
width = "double"
height = 3.35
line_width = 1.2
thick_line_width = 1.8

[figures.007]
width = "double"
height = 3.35
line_width = 1.2
thick_line_width = 1.8
show_titles = false
show_panel_labels = true
panel_label_x = 0.02
panel_label_y = 0.92
panel_label_size = 9

[figures.008]
width = "double"
height = 3.35
line_width = 1.2
thick_line_width = 1.8
show_titles = false
show_panel_labels = true
